name: Deploy Worker

# Trigger: chỉ khi code thay đổi (src/, config, scripts, docs)
# Content JSON → R2 được handle bởi sync-content.yml riêng
on:
  push:
    branches:
      - main
      - dev
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "vite.config.*"
      - "wrangler.json"
      - "wrangler.toml"
      - "package*.json"
      - "tsconfig*.json"
      - "scripts/**"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    name: 🚀 Deploy Worker
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Node.js 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build
      - name: Build
        run: npm run build

      # 5. Deploy Worker
      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "55e3a88290a27547ff01294004561906"
        run: ./node_modules/.bin/wrangler deploy

      # 6. D1 Migrations (idempotent — bỏ qua nếu column đã tồn tại)
      - name: Apply D1 Migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "55e3a88290a27547ff01294004561906"
        run: |
          echo "⚙️ Chạy migration 0009..."
          ./node_modules/.bin/wrangler d1 execute luyen-thi-db \
            --file src/worker/migrations/0009_add_quiz_attempt_metadata.sql \
            --remote || echo "⚠️ Migration đã chạy trước đó — bỏ qua"

      # 7. Sync Blog Content → R2
      - name: Sync Blog Content → R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "55e3a88290a27547ff01294004561906"
        run: |
          echo "📚 Bước 1: Regenerate blog index..."
          node scripts/build-blog-index.mjs

          echo "📤 Bước 2: Upload blog-index.json..."
          ./node_modules/.bin/wrangler r2 object put \
            luyen-thi-content/blog/blog-index.json \
            --file content/blog/blog-index.json \
            --content-type application/json \
            --remote

          echo "📤 Bước 3: Auto-upload tất cả .md files..."
          BLOG_DIR="content/blog"
          MD_COUNT=0

          while IFS= read -r -d '' file; do
            filename=$(basename "$file")
            [[ "$filename" == _* ]] && continue

            r2_path="${file#$BLOG_DIR/}"
            r2_key="blog/posts/${r2_path}"

            echo "  → ${r2_key}"
            ./node_modules/.bin/wrangler r2 object put \
              "luyen-thi-content/${r2_key}" \
              --file "$file" \
              --content-type "text/markdown; charset=utf-8" \
              --remote

            MD_COUNT=$((MD_COUNT + 1))
          done < <(find "$BLOG_DIR" -name "*.md" -not -name "_*" -print0)

          echo "✅ Blog sync xong: ${MD_COUNT} bài → R2"
