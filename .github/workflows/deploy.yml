name: Deploy to Cloudflare Workers

# ════════════════════════════════════════
# Trigger: push lên nhánh main hoặc dev
# ════════════════════════════════════════
on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy:
    name: 🚀 Deploy Worker + Sync R2
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Cài Node.js 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # 3. Cài dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build (TypeScript + Vite)
      - name: Build
        run: npm run build

      # 5. D1 Migrations — OPTIONAL: chỉ chạy khi token có quyền D1:Edit
      # Nếu fail thì deploy vẫn tiếp tục (continue-on-error: true)
      # Để seed local: wrangler login → wrangler d1 execute luyen-thi-db --remote --file <file>
      - name: D1 — Run vocabulary seed migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "55e3a88290a27547ff01294004561906"
        run: |
          echo "▶ Seeding vocabulary_bank into D1..."
          ./node_modules/.bin/wrangler d1 execute luyen-thi-db --remote --yes --file src/worker/migrations/0005_seed_vocabulary_flyers_batch1.sql
          ./node_modules/.bin/wrangler d1 execute luyen-thi-db --remote --yes --file src/worker/migrations/0006_seed_vocabulary_flyers_batch2.sql
          ./node_modules/.bin/wrangler d1 execute luyen-thi-db --remote --yes --file src/worker/migrations/0007_seed_vocabulary_flyers_batch3.sql
          ./node_modules/.bin/wrangler d1 execute luyen-thi-db --remote --yes --file src/worker/migrations/0008_seed_vocabulary_flyers_batch4.sql
          echo "✅ D1 seed complete — 250 words loaded"
        continue-on-error: false

      # 6. Deploy Worker lên Cloudflare (sau khi DB đã sẵn sàng)
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # 7. Xóa files sai vị trí (cambridge/flyers/math/ — đã upload nhầm) + Upload đúng SITEMAP
      - name: Sync content JSON → R2 (theo SITEMAP)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "55e3a88290a27547ff01294004561906"
        run: |
          echo "🗑️ Xóa files sai vị trí (cambridge/flyers/math/)..."
          ./node_modules/.bin/wrangler r2 object delete luyen-thi-content/quizzes/cambridge/flyers/math/MATH-L1-P1.json  --remote || true
          ./node_modules/.bin/wrangler r2 object delete luyen-thi-content/quizzes/cambridge/flyers/math/MATH-L1-P2.json  --remote || true
          ./node_modules/.bin/wrangler r2 object delete luyen-thi-content/quizzes/cambridge/flyers/math/MATH-L1-P3.json  --remote || true
          ./node_modules/.bin/wrangler r2 object delete luyen-thi-content/quizzes/cambridge/flyers/math/MATH-L1-P4.json  --remote || true
          ./node_modules/.bin/wrangler r2 object delete luyen-thi-content/quizzes/cambridge/flyers/math/MATH-L1-P5.json  --remote || true
          ./node_modules/.bin/wrangler r2 object delete luyen-thi-content/quizzes/cambridge/flyers/math/MATH-L1-P6.json  --remote || true
          ./node_modules/.bin/wrangler r2 object delete luyen-thi-content/quizzes/cambridge/flyers/math/MATH-L1-P7.json  --remote || true
          ./node_modules/.bin/wrangler r2 object delete luyen-thi-content/quizzes/cambridge/flyers/math/MATH-L1-P8.json  --remote || true
          ./node_modules/.bin/wrangler r2 object delete luyen-thi-content/quizzes/cambridge/flyers/math/MATH-L1-P9.json  --remote || true
          ./node_modules/.bin/wrangler r2 object delete luyen-thi-content/quizzes/cambridge/flyers/math/MATH-L1-P10.json --remote || true
          ./node_modules/.bin/wrangler r2 object delete luyen-thi-content/quizzes/MATH-L1-P1.json --remote || true
          echo "▶ Lớp 6 / Toán Tư Duy..."
          ./node_modules/.bin/wrangler r2 object put luyen-thi-content/quizzes/lop6/toan/MATH-L1-P1.json  --file content/math/MATH-L1-P1.json  --content-type application/json --remote
          ./node_modules/.bin/wrangler r2 object put luyen-thi-content/quizzes/lop6/toan/MATH-L1-P2.json  --file content/math/MATH-L1-P2.json  --content-type application/json --remote
          ./node_modules/.bin/wrangler r2 object put luyen-thi-content/quizzes/lop6/toan/MATH-L1-P3.json  --file content/math/MATH-L1-P3.json  --content-type application/json --remote
          ./node_modules/.bin/wrangler r2 object put luyen-thi-content/quizzes/lop6/toan/MATH-L1-P4.json  --file content/math/MATH-L1-P4.json  --content-type application/json --remote
          ./node_modules/.bin/wrangler r2 object put luyen-thi-content/quizzes/lop6/toan/MATH-L1-P5.json  --file content/math/MATH-L1-P5.json  --content-type application/json --remote
          ./node_modules/.bin/wrangler r2 object put luyen-thi-content/quizzes/lop6/toan/MATH-L1-P6.json  --file content/math/MATH-L1-P6.json  --content-type application/json --remote
          ./node_modules/.bin/wrangler r2 object put luyen-thi-content/quizzes/lop6/toan/MATH-L1-P7.json  --file content/math/MATH-L1-P7.json  --content-type application/json --remote
          ./node_modules/.bin/wrangler r2 object put luyen-thi-content/quizzes/lop6/toan/MATH-L1-P8.json  --file content/math/MATH-L1-P8.json  --content-type application/json --remote
          ./node_modules/.bin/wrangler r2 object put luyen-thi-content/quizzes/lop6/toan/MATH-L1-P9.json  --file content/math/MATH-L1-P9.json  --content-type application/json --remote
          ./node_modules/.bin/wrangler r2 object put luyen-thi-content/quizzes/lop6/toan/MATH-L1-P10.json --file content/math/MATH-L1-P10.json --content-type application/json --remote
          echo "▶ Cambridge / Flyers / Reading..."
          ./node_modules/.bin/wrangler r2 object put luyen-thi-content/quizzes/cambridge/flyers/reading/RW001.json   --file content/flyers/RW001.json           --content-type application/json --remote
          ./node_modules/.bin/wrangler r2 object put luyen-thi-content/quizzes/cambridge/flyers/reading/RW2-001.json --file content/flyers/reading/RW2-001.json  --content-type application/json --remote
          ./node_modules/.bin/wrangler r2 object put luyen-thi-content/quizzes/cambridge/flyers/reading/RW3-001.json --file content/flyers/reading/RW3-001.json  --content-type application/json --remote
          echo "✅ R2 sync theo SITEMAP: lop6/toan(10) + cambridge/flyers/reading(3)"
