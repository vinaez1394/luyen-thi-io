          ./node_modules/.bin/wrangler r2 object delete luyen-thi-content/quizzes/MATH-L1-P1.json --remote || true
          echo "🗑️ Xóa R2 keys cũ lop6/toan/MATH-L1-P*..."
          ./node_modules/.bin/wrangler r2 object delete luyen-thi-content/quizzes/lop6/toan/MATH-L1-P1.json  --remote || true
