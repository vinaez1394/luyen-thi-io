name: Deploy to Cloudflare Workers

# ════════════════════════════════════════
# Trigger: push lên nhánh main hoặc dev
# ════════════════════════════════════════
on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy:
    name: 🚀 Deploy Worker + Sync R2
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Cài Node.js 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # 3. Cài dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build (TypeScript + Vite)
      - name: Build
        run: npm run build

      # 5. D1 Migrations — chạy trước khi deploy Worker
      # INSERT OR IGNORE → safe to re-run multiple times
      - name: D1 — Run vocabulary seed migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "55e3a88290a27547ff01294004561906"
        run: |
          echo "▶ Seeding vocabulary_bank into D1..."
          ./node_modules/.bin/wrangler d1 execute luyen-thi-db --remote --yes --file src/worker/migrations/0005_seed_vocabulary_flyers_batch1.sql
          echo "✅ Batch 1 done (table + 80 words)"
          ./node_modules/.bin/wrangler d1 execute luyen-thi-db --remote --yes --file src/worker/migrations/0006_seed_vocabulary_flyers_batch2.sql
          echo "✅ Batch 2 done (90 words)"
          ./node_modules/.bin/wrangler d1 execute luyen-thi-db --remote --yes --file src/worker/migrations/0007_seed_vocabulary_flyers_batch3.sql
          echo "✅ Batch 3 done (80 words)"
          ./node_modules/.bin/wrangler d1 execute luyen-thi-db --remote --yes --file src/worker/migrations/0008_seed_vocabulary_flyers_batch4.sql
          echo "✅ Batch 4 done (30 words)"
          echo ""
          echo "▶ Verifying word count..."
          ./node_modules/.bin/wrangler d1 execute luyen-thi-db --remote --yes --command "SELECT topic, COUNT(*) as c FROM vocabulary_bank GROUP BY topic ORDER BY topic;"
        continue-on-error: false

      # 6. Deploy Worker lên Cloudflare (sau khi DB đã sẵn sàng)
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # 6. Sync toàn bộ content JSON lên R2
      - name: Sync MATH-L1-P1
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: r2 object put luyen-thi-content/quizzes/MATH-L1-P1.json --file content/math/MATH-L1-P1.json --content-type application/json
        continue-on-error: true

      - name: Sync MATH-L1-P2
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: r2 object put luyen-thi-content/quizzes/MATH-L1-P2.json --file content/math/MATH-L1-P2.json --content-type application/json
        continue-on-error: true

      - name: Sync MATH-L1-P3
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: r2 object put luyen-thi-content/quizzes/MATH-L1-P3.json --file content/math/MATH-L1-P3.json --content-type application/json
        continue-on-error: true

      - name: Sync MATH-L1-P4
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: r2 object put luyen-thi-content/quizzes/MATH-L1-P4.json --file content/math/MATH-L1-P4.json --content-type application/json
        continue-on-error: true

      - name: Sync MATH-L1-P5
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: r2 object put luyen-thi-content/quizzes/MATH-L1-P5.json --file content/math/MATH-L1-P5.json --content-type application/json
        continue-on-error: true

      - name: Sync MATH-L1-P6
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: r2 object put luyen-thi-content/quizzes/MATH-L1-P6.json --file content/math/MATH-L1-P6.json --content-type application/json
        continue-on-error: true

      - name: Sync MATH-L1-P7
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: r2 object put luyen-thi-content/quizzes/MATH-L1-P7.json --file content/math/MATH-L1-P7.json --content-type application/json
        continue-on-error: true

      - name: Sync MATH-L1-P8
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: r2 object put luyen-thi-content/quizzes/MATH-L1-P8.json --file content/math/MATH-L1-P8.json --content-type application/json
        continue-on-error: true

      - name: Sync MATH-L1-P9
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: r2 object put luyen-thi-content/quizzes/MATH-L1-P9.json --file content/math/MATH-L1-P9.json --content-type application/json
        continue-on-error: true

      - name: Sync MATH-L1-P10
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: r2 object put luyen-thi-content/quizzes/MATH-L1-P10.json --file content/math/MATH-L1-P10.json --content-type application/json
        continue-on-error: true

      - name: Sync RW001
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: r2 object put luyen-thi-content/quizzes/RW001.json --file content/flyers/RW001.json --content-type application/json
        continue-on-error: true

      - name: Sync RW2-001
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: r2 object put luyen-thi-content/quizzes/RW2-001.json --file content/flyers/reading/RW2-001.json --content-type application/json
        continue-on-error: true

      - name: Sync RW3-001
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: r2 object put luyen-thi-content/quizzes/RW3-001.json --file content/flyers/reading/RW3-001.json --content-type application/json
        continue-on-error: true
